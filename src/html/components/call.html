<section
  class="call modal__content"
  id="call"
  data-modal-target="call"
>
  <button
    class="close-btn"
    type="button"
    aria-label="Close modal"
  >
    <span class="close-btn__span"></span>
    <span class="close-btn__span"></span>
  </button>
  <div class="call__header">
    <h3 class="call__title">
      <span class="call__title-row call__title-row--with-line">
        <span class="call__title-text">speak</span>
      </span>
      <span class="call__title-row">with our team</span>
    </h3>
  </div>

  <div class="call__body">
    <p class="call__descr">
      Feel free to call us. Our Pascal Vent experts will be happy to answer any
      questions and help you make the right choice.
    </p>

    <dl class="call__schedule">
      <dt>Office Hours:</dt>
      <dd>
        <load
          class="call__clock-icon"
          src="/src/html/icons/common/clock.html"
        />
        <span>Mon–Sat, 9:00 am – 7:00 pm</span>
      </dd>
    </dl>

    <div class="call__phones">
      <a
        class="call__phone-link"
        href="tel:+442079460018"
      >
        <load
          class="call__phone-icon phone-icon"
          src="/src/html/icons/common/phone.html"
        />
        <span> +44 20 7946 0018</span>
      </a>
      <span class="call__phones-devider"></span>
      <a
        class="call__phone-link"
        href="tel:+442079460552"
      >
        <load
          class="call__phone-icon phone-icon"
          src="/src/html/icons/common/phone.html"
        />
        <span> +44 20 7946 0552</span>
      </a>
    </div>
  </div>
</section>
