<div
  class="slider-nav {=$class}"
  role="group"
  aria-label="Slider controls"
>
  <button
    class="slider-nav__button slider-nav__button--prev"
    aria-label="Previous slide"
    disabled
  >
    <load src="/src/html/icons/common/prev-arrow.html" />
  </button>

  <button
    class="slider-nav__button slider-nav__button--next"
    aria-label="Next slide"
  >
    <load src="/src/html/icons/common/next-arrow.html" />
  </button>
</div>
