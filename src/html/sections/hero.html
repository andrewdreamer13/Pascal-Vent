<section
  class="hero"
  id="hero"
>
  <div class="container-right">
    <div class="hero__inner">
      <div class="hero__content">
        <h1 class="hero__title">
          <span class="hero__title-row hero__title-row--with-line">
            <span class="hero__title-text"> Clean Air</span>
          </span>
          <span class="hero__title-row">Together with</span>
          <span class="hero__title-row hero__title-row--accent"
            >pascal vent</span
          >
        </h1>

        <p class="hero__description">
          Design, supply and installation of ventilation and air conditioning
          systems
        </p>

        <div class="hero__contacts">
          <div class="hero__contact-item">
            <load
              class="hero__svg-icon map-pin"
              src="/src/html/icons/common/map-pin.html"
            />
            <span class="hero__contact-text">Greater London,<br /> London</span>
          </div>

          <div class="hero__contact-item">
            <load
              class="hero__svg-icon phone-icon"
              src="/src/html/icons/common/phone.html"
            />
            <div class="hero__contact-phones">
              <a
                class="hero__phone-link"
                href="tel:+442079460018"
              >
                <load
                  class="hero__svg-icon phone-icon--mobile"
                  src="/src/html/icons/common/phone.html"
                />
                <span> + 44 20 7946 0018</span>
              </a>
              <a
              class="hero__phone-link"
                href="tel:+442079460552"
              >
                <load
                  class="hero__svg-icon phone-icon--mobile"
                  src="/src/html/icons/common/phone.html"
                />
                <span> + 44 20 7946 0552</span>
              </a>
            </div>
          </div>
        </div>

        <button
          class="hero__button button"
          type="button"
          data-modal="callback"
        >
          get a quote
        </button>
      </div>

      <load src="/src/html/sliders/hero-slider.html" />
    </div>
  </div>
</section>
